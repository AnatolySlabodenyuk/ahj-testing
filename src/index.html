<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Validator</title>
</head>
<body>
  <div class="widget">
    <div class="card-icons">
      <img id="icon-visa"       class="card-icon" src="img/visa.svg"       alt="Visa" data-type="visa">
      <img id="icon-mastercard" class="card-icon" src="img/mastercard.svg" alt="Mastercard" data-type="mastercard">
      <img id="icon-amex"       class="card-icon" src="img/amex.svg"       alt="American Express" data-type="amex">
      <img id="icon-discover"   class="card-icon" src="img/discover.svg"   alt="Discover" data-type="discover">
      <img id="icon-mir"        class="card-icon" src="img/mir.svg"        alt="Mir" data-type="mir">
    </div>

    <div class="input-row">
      <input
        id="card-number"
        class="card-input"
        type="text"
        inputmode="numeric"
        placeholder="4111111111111111"
        maxlength="19"
        autocomplete="cc-number"
      />
      <button id="validate-btn" class="validate-btn">Click to Validate</button>
    </div>

    <div id="card-status" class="card-status"></div>
  </div>
</body>
</html>
